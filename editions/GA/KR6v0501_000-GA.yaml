body:
  text: 吳若準旣聞顧廣圻改定洛陽伽藍記本注之說於其舅而有集證之作唯吳本正文太簡子注過繁其所分析疑與楊記舊觀相去甚遠唐晏因是有洛陽伽藍記鉤沈之作晏本滿州人姓瓜爾佳氏淸社旣屋始改氏唐光緒八年一八八二進士精於詞章書畫金石考據之學民國四年一九一五避居滬上因嫌吳氏集證限域未淸混淆不免雖少勝於舊編猶未盡夫塵障乃信手鈎乙數則以後迎刄而解都已盡卷成此鉤沈一編唐氏此書全用水經注體裁涉及寺事市里第宅例高一格書附注概低一格衒之案語則作夾行誤字意定以別之考訂之字旁以圈別之又衒之此書意在借伽藍而存時事故搜採魏書北史諸書於記中人物皆略注大概而它有足以引證此書者亦附焉吳氏集證附圖亦為改訂仍冠篇首唯就唐氏凡例案之亦不無可議者張宗祥合校本後記云鉤沈本第五卷原本注文且誤入正文則亦未為盡合也續修四庫全書提要更擧數例以證其誤如卷一永寧寺浮圖一節之衒之常與河南尹胡孝世共登之下臨雲雨信哉不虛等二十一字應作夾行而唐本誤為注文又如卷五禪虛寺條所謂永平里也注卽漢太上王廣處唐本列為正文張氏則以為此處注字幸存卽漢太上王廣處六字彬案應為七字明係注文不得誤入正文諸如此例可議尚多要之衒之此書本文子注不易別析苟無如隱以前之古本强為分析終不免於千慮之失耳唐氏鉤沈上繼吳氏集證而作下啟張氏合校本出因據民國六年潮陽鄭氏刋本景印因係僅供學者比閱故集證與鉤沈兩本皆以四合一縮印之洛陽伽藍記總圖洛陽伽藍記鉤沈序昔唐劉知幾謂洛陽伽藍記定彼榛楛列為子注斯言已逾千嵗而世行本皆刊於明代子注已雜入正文無復分別亦竟無人為料理出之此書遂不可讀矣近者之江吳氏創始為之畫分段落正文與注甫得眉目然究嫌其限域未清混淆不免雖少勝於舊編猶未盡夫塵障鄙人索居海上偶展此書覺有會於心乃信手鉤乙數則以後迎刃而解都已盡卷未敢謂足揆原編然較各本則有間矣錄而存之以備一家之說云爾嗟乎衒之良史才也彼蓋身丁元魏之季見夫胡后貪權廢長立少諸王酣豢縱欲養驕大臣無元良之佐宦寺逞城社之威文士優柔武夫跋扈遂以釀成河陰之禍故此書於爾朱之亂三致意焉逮夫鑾輅西行邦圻遷鄴元氏之局告終渤海之基方肇而衒之又所目覩黍離之悲無可寄慨乃於洛陽伽藍託其懷舊之思焉豈真為彼教之助乎宜其寥寥一篇孤行殆將千二百年而莫之能廢也殺青既竟更為條例敘之左方古人箸書必有一定體裁北魏人箸述在者惟此暨水經注耳故今刊定此書全用水經注體裁書記伽藍自應以寺為主而時事輔之故凡涉及寺事例高一格書而餘文坿之名稱洛陽則凡市里亦概入正文高一格書之官寺亦然凡涉及時人第宅亦高一格然必由里及居不復特出此外坿注概為低一格書若坿注之外有楊氏案語則作夾行書所謂注中有注也此書誤字極多有可考訂則再三斟酌而從其一若竟無可從而灼見其為某字間有以意定之者然必以別之此書各本互有不同吳氏別為考異今仿阮氏刻經疏例凡遇考訂之字旁以圈別之楊氏此書意在借伽藍而存時事故於元氏諸王及公卿多述其行事而河陰一役言之尤詳今搜採魏書及北史凡書中人物皆略注其大概而它有足以引證此書者亦坿焉吳氏書有圖一紙而小有未合今改訂而仍以冠於其首焉乙卯春二月漯川居士唐晏敘於海上飛塵小住
