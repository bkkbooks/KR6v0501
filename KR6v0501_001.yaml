body:
  text: 原序魏撫軍府司馬楊衒之譔三墳五典之說九流百代之言並理在寰區而義兼天外至於一乘二諦之原三明六通之旨西域備詳東土靡記自頂日感夢滿月流光陽門飾豪眉之像夜臺圖紺髮之形邇來奔競其風遂廣至晉永嘉惟有寺四十二所迨皇魏受圖光宅嵩雒篤行彌繁法教逾盛王侯貴臣棄象馬如脫屣士庶豪家捨資財若遺跡於是招提櫛比寶塔駢羅爭寫天上之姿競摹山中之影金剎與靈臺比高宮殿共阿房等壯豈直木衣綈繡土被朱紫而已哉暨永熙多難皇輿遷鄴諸寺僧尼亦與時徙至武定五年歲在丁卯余因行役重覽洛陽城郭崩毁宮室傾覆寺觀灰燼廟塔邱墟牆被蒿艾巷羅荊棘野獸穴於荒階山鳥巢於庭樹遊兒牧豎躑躅於九逵農夫耕稼蓺黍於雙闕麥秀之感非獨殷墟黍離之悲信哉周室京城表裏凡有一千餘寺今日寥廓鐘聲罕聞恐後世無傳故撰斯記然寺數最多不可徧寫今之所錄止大伽藍其中小者取其詳世諦事因而出之先以城內為始次及城外表列門名以遠近為五篇余才非箸述多有遺漏後之君子詳其闕焉魏書孝武帝紀永熙三年冬十月高歡推清河王亶子善見為主徙都鄴是為東又東魏孝靜帝第三改元曰武定凡八年武定五年正月高歡死按法苑珠林楊衒之官銜作期城郡守而廣宏明集則作祕書監右北平人太和十七年後魏高祖遷都洛陽詔司空公穆亮營造宮室洛陽城門依魏晉舊名東面有三門北頭第一曰建春門漢曰上東門阮籍詩曰步出上東門是也魏晉曰建春門高祖因而不改魏書太和十七年冬十月朔世祖如金墉城徵穆亮使與尚書李沖將作大匠董爵經營洛邑次南曰東陽門漢曰東中門魏晉曰東陽門高祖因而不改次南曰青陽門漢曰望京門魏晉曰青明門高祖改為青陽門南面有三門東頭第一門曰開陽門初漢光武遷都雒陽作此門始成而未有名忽夜中有柱自來在樓上後瑯琊郡開陽縣言南門一柱飛去使來視之則是也遂以開陽為名自魏及晉因而不改高祖亦然次西曰平昌門漢曰平門魏晉曰平昌門高祖因而不改次西曰宣陽門漢曰津陽門魏晉曰宣陽門高祖因而不改按水經注穀水又南東屈逕津陽門南又東逕宣陽門南又東逕平昌門南又東逕開陽門南是魏時洛陽南面有四門而考之晉書地理志亦云有四門但西頭作建陽門疑為津字之誤然為四門則無異詞此云三門當存疑西面有四門南頭第一門曰西明門漢曰廣陽門魏晉因而不改高祖改為西明門次北曰西陽門漢曰雍門魏晉曰西明門高祖改為西陽門次北曰閶闔門漢曰上西門上有銅旋璣玉衡以齊七政魏晉曰閶闔門高祖因而不改次北曰承明門承明者高祖所立當金墉城前東西大道遷京之始宮闕未就高祖住在金墉城城西有王南寺高祖數詣沙門論義故通此門而未有名世人謂之新門時王公卿士迎駕於新門高祖謂御史中尉李彪曰曹植詩云謁帝承明廬此門宜以承明為稱遂名之魏書孝文帝本紀太和十九年八月金墉宮成引羣臣宴殿堂北面有二門西頭曰大夏門漢曰夏門魏晉曰大夏門魏明帝造三層樓去地十丈高祖世宗造三層樓去地二十丈洛陽城門樓皆兩重去地百尺惟大夏門甍棟干雲東頭曰廣莫門漢曰穀門魏晉曰廣莫門高祖因而不改自廣莫門以西至於大夏門宮觀相連被諸城上也一門有三道所謂九逵城內永甯寺熙平元年靈太后胡氏所立也在宮前閶闔門南一里御道西其寺東有太尉府西對永康里南界昭玄曹北鄰御史臺魏書宣武帝靈皇后胡氏司徒國珍女也又按魏書釋老志先是立監福曹太和二十一年改昭元曹備具官屬以斷僧務世宗即位詔僧犯殺人以上罪者仍依俗斷餘付昭元斷之閶闔門御道東有左衞府府南有司徒府司徒府南有國子學堂內有孔丘像顏淵問仁子路問政在側魏書本紀高祖太和十九年八月立國子太學四門小學於洛陽又肅宗正光二年春正月車駕幸國子學講孝經祠孔子以顏淵配國子南有宗正寺寺南有太廟廟南有護軍府府南有衣冠里御道西有右衛府府南太尉府府南有將作曹曹南有九級府府南有太社社南有凌陰里即四朝時藏氷處也中有九層浮圖一所架木為之舉高九十丈有剎復高十丈合去地一千尺去京師百里已遙見之初掘基至黃泉下得金像三十軀太后以為信法之徵是以營建過度也剎上有寶瓶容二十五石寶瓶下有承露金盤三十重周匝皆垂金鐸復有鐵鎖四道引剎向浮圖四角鎖上亦有金鐸鐸大小如一石罋子浮圖有九級角角皆懸金鐸合上下有一百二十鐸浮圖有四面面有三戶六窗戶皆朱漆扉上有五行金釘合五千四百枚復有金環鋪首殫土木之功窮造形之巧佛事精妙不可思議繡柱金鋪駭人心目至於高風永夜寶鐸和鳴鏗鏘之音聞及十餘里魏書釋老志肅宗於太社西起永甯寺靈太后親率百僚表立剎浮圖九層高四十餘丈費用不可勝計浮圖北有佛殿一所形如太極殿中有丈八金像一軀人中長金像十軀繡珠像三軀織成五軀作功奇巧冠於當世僧房樓觀一千餘間雕梁粉壁青瑣綺疏難得而言括椿松柏扶疏拂簷翠竹香草布護階墀是以常景碑云須彌寶殿兜率淨宮莫尚於斯也外國所獻金像皆在此寺魏書釋老志大安初有師子國沙門難提等五人奉佛像三到京又沙門赴京師致佛鉢並畫像寺院牆皆施短椽以瓦覆之若今宮牆也四面各開一門南門樓三重通三道去地二十丈形制似今端門圖以雲氣畫彩仙靈綺錢青瑣赫麗華拱門有四力士四師子飾以金銀加之珠玉裝嚴煥炳世所未聞東西兩門皆亦如之所可異者唯樓二重北門一道不施屋似鳥頭門四門外樹以青槐亘以綠水京邑行人多庇其下路斷飛塵不由奔雲之潤清風送涼豈籍合歡之發按水經注云永甯寺是曹爽宅經始之日於寺院西南隅得爽窟室下入土可丈許地壁悉壘方石砌之石作細密都無所毁自非曹爽庸匠亦難復制此詔中書舍人常景為寺碑文景字永昌河內人也敏學博通知名海內太和十九年為高祖所器拔為律學博士刑法疑獄多訪於景正始初詔刊律令永作通式敕景共治書侍御史高僧裕羽林監王元規尚書郎祖瑩員外散騎侍郎李琰之等譔集其事又詔太師彭城王勰青州刺史劉芳入預其議景討正科條商搉古今甚有倫敘見行於世今律二十篇是也又其芳造洛陽宮殿門閣之名經涂邑里之號出除長安令時人比之潘岳其後厯位中書舍人黃門侍郎秘書監幽州刺史儀同三司學徒以為榮焉景入參近侍出為侯牧居室貧儉事等農家惟有經史盈車滿架景所著文集數百餘篇給事封暐伯作序行於世魏書高綽字僧裕渤海蓨人允之孫也厯尚書右丞豫并二州刺史諡文簡又祖瑩字元珍范陽遒人也官至車騎大將軍封文安縣子以文學知名又劉芳字伯文彭城叢亭里人官太子左庶子員外散騎常侍又彭城王勰字彥和獻文第六子太和九年封始平王改彭城王又常景字永昌河內温人爽子又李琰之字景珍小字默蠡隴西狄道人車騎將軍儀同三司贈司徒諡文簡裝飾畢功明帝與太后共登之視宮內如掌中臨京師若家庭以其目見宮中禁人不聽升衒之嘗與河南尹胡世孝共登之下臨雲雨信哉不虛時有西域沙門菩薩達摩者波斯國胡人也起自荒裔來遊中土見金盤炫日光照雲表寶鐸含風響出天外歌詠贊歎實是神功自云年一百五十嵗厯涉諸國靡不周徧而此寺精麗徧閻浮所無也極佛境界亦未有此口唱南無或合掌連日至孝昌二年中大風發屋拔樹剎上寶瓶隨風而落入地丈餘復命工匠更著新瓶建義元年太原王爾朱榮總士馬於此寺榮字天寶北地秀容人也世為第一領氐酋長博陵郡公部落八千餘家馬有數萬匹富等天府泰武元年二月中帝崩無子立臨洮王世子釗以紹大業年三嵗太后貪秉朝政故以立之榮謂并州刺史元天穆曰皇帝晏駕春秋十九海內士庶猶曰幼君今奉未言之兒以臨天下而望昇平其可得乎吾世荷國恩不能坐看成敗今欲以鐵騎三千赴哀山陵兼問侍臣帝崩之由君竟謂如何穆曰明公世跨并土雄才傑出部落之民控弦一萬若能行廢立之事伊霍復見於今日榮即日共穆結異姓兄弟穆年大榮兄事之榮為盟主穆亦拜榮於是密議長君諸王之中不知誰應當璧遂於晉陽人各鑄像不成惟長樂王子攸象光相具足端嚴特妙是以榮意在長樂遣蒼頭王豐入洛約以為主長樂即許之共刻期契榮三軍皓素揚旌南出太后聞榮舉兵召王公議之時胡氏專寵王宗怨望入議者莫肯致言唯黃門侍郎徐紇曰爾朱馬邑小胡人才凡鄙不度德量力長戟指闕所謂窮轍拒輪積薪候燎今宿衞文武足得一戰但守河橋觀其意趣榮懸軍千里兵老師敝以逸待勞破之必矣后然紇言即遣都督李神軌鄭季明等領眾五千鎮河橋四月十一日榮過河內至高頭驛長樂王從雷陂北渡赴榮軍所神軌等見長樂王往遂開門降十二日榮軍於邙山之北河陰之野十三日召百官赴駕至者盡誅之王公卿士及諸朝臣死者二千餘人十四日車駕入城大赦天下改號為建義元年是為莊帝於是新經大兵人物殲盡流迸之徒驚駭未出莊帝肇升太極解綱垂仁唯散騎常侍山偉一人拜恩南闕加榮使持節中外諸軍事大將軍開府北道大行臺都督十州諸軍事領左右太原王其天穆為侍中太尉公世襲并州刺史上黨王起家為公卿牧守者不可勝數二十日洛中草草猶自不安死生相怨人懷異慮貴室豪家弃宅競竄貧夫賤士襁負爭逃於是出詔濫死者普加褒贈三品以上贈三公五品以上贈令僕七品以上贈州牧白民贈鎮郡於是稍安帝納榮女為皇后進榮為柱國大將軍錄尚書事進天穆為將軍餘如故魏書爾朱榮字天寶北秀容人也略與此同又元天穆高涼王孤之裔長生之子也又徐紇博昌人官給事黃門諂附清河王懌又附元乂爾朱入洛奔梁又李神軌小名青肫頓邱人榮之子也襲陳留侯征東將軍死於河陰又山偉字仲才洛陽人官至衞大將軍封東阿伯按雷陂魏書作高渚永安二年五月北海王元顥復入洛在此寺聚兵顥莊帝從兄也孝昌末鎮汲郡聞爾朱榮入洛陽遂南奔蕭衍是年入洛莊帝北巡顥登皇帝位改元曰建武元年顥與莊帝書曰大道既隱天下匪公禍福不追與能義絕朕猶庶幾五帝無取六軍正以糠粃萬乘錙銖大寶非貪皇帝之尊豈圖六合之富直以爾朱榮往嵗入洛順而勤王終為魏賊逆刃加於君親鋒鏑肆於卿宰元氏少長殆欲無遺已有陳恆盜齊之心非無六卿分晉之計但以四海橫流欲簒未可暫樹君親假相拜置害卿兄弟獨夫介立遵養待時臣節詎久朕睹此寒心遠投江表泣請梁朝誓在復恥風行建業電復三川正欲問罪於爾朱出卿於桎梏恤深怨於骨肉解蒼生於倒懸謂卿明眸擊節躬來見我共敘哀辛同討凶羯不意駕入成皋便爾北渡雖迫於凶手勢不自由或訢生素懷棄劒猜吾聞之永歎撫衿而失何者朕之於卿兄弟非遠連枝分葉興滅相依假有內鬩外猶禦侮況吾與卿睦厚偏篤其於急難凡今莫如棄親即讐義將焉據也且爾朱榮不臣之跡暴於旁午謀危社稷愚智同見卿乃明白疑於必然託命豺狼委身虎口棄親助賊兄弟尋戈假獲民地本是榮物若克城邑絕非卿有徒危宗國以廣寇仇快賊莽之心假卞莊之利有識之士咸為慚之今國家隆替在卿與吾若天道助順誓兹義舉則皇魏宗社與運無窮脫天不厭亂胡羯未殄鴟鳴狼噬薦食河北在榮為福於卿為禍豈伊異人尺書道意卿宜三復義利是圖富貴可保徇人非慮終不食言自相魚肉善擇元吉勿貽後悔此黃門侍郎祖瑩之詞也時帝在長子城太原王上黨王來赴急難六月帝圍河內太守元桃湯車騎將軍宗正珍孫等為顥守攻之弗克時暑炎赫將士疲勞太原王欲使帝幸晉陽至秋更舉大義未決召劉助筮之助曰必克於是至明盡力攻之如其言桃湯珍孫並斬首以徇三軍顥聞河內不守親率百僚出鎮河橋特遷侍中安豐王延明往守硤石七月帝至河陽與顥隔河相望太原王命車騎將軍爾朱兆潛師渡河破延明於硤石顥聞延明敗亦散走所將江淮子弟五千人莫不解甲相泣握手成別顥與數十騎欲奔蕭衍至長社為村民斬其首傳送京師二十日帝還洛陽進太原王天柱大將軍餘官如故進上黨王太宰餘官亦如故魏書北海王顥詳之子也又安豐王延明猛之子也與中山王熙及臨淮王彧等以才學令望並有名於時元顥敗奔梁又劉靈助燕郡人賣卜於市爾朱榮信卜筮靈助所占屢中被親信官至尚書僕射後起兵為高歡所誅永安三年逆賊爾朱兆囚莊帝於寺時太原王位極心驕功高意侈予奪臧否肆意帝怒謂左右曰朕甯作高貴鄉公死不作漢獻帝生九月二十五日詐言産太子榮穆並入朝莊帝手刃榮於光明殿穆為伏兵魯暹所殺榮世子部落大人亦死焉榮部下車騎將軍爾朱陽都等二十人隨入東華門亦為伏兵所殺唯右僕射爾朱世隆素在家聞榮死總榮部曲燒西陽門奔河橋至十月一日世隆與榮妻北鄉郡長公主至芒山馮王寺為榮追福薦齋即遣爾朱侯討伐爾朱那律歸等領胡騎一千皆白服來至郭下索太原王尸喪帝升大夏門望之遣主書牛法尚謂歸等曰太原立功不終陰圖釁逆王法無親已依正刑罪止榮身餘皆不問卿等何為不降官爵如故歸曰臣從太原王來朝陛下何忽今日枉致無理臣欲還晉陽不忍空去願得太原王尸喪生死無恨發言雨淚哀不自勝羣胡慟哭聲震京師帝聞之亦為傷懷遣侍中朱元龍齎鐵券與世隆待之不死官位如故世隆謂元龍曰太原王功格天地造濟生民赤心奉國神明所知長樂不顧信誓枉害忠良今日兩行鐵字何足可信吾為太原王報仇終不歸降元龍見世隆呼帝為長樂知其不欵具以言帝帝即出庫物置城西門外募敢死之士以討世隆一日即得萬餘人與歸等戰於郭外兇勢不摧歸等婁涉戎場便利擊刺京師士眾未習軍旅雖皆勇義力不從心三日頻戰而游魂不息帝更募人斷河橋有漢中人李苗為水軍從上流放火燒橋世隆見橋被焚遂大剽生民北上太行帝遣侍中源子恭黃門郎楊寛引步騎三萬鎮河內世隆至高都立太原太守長廣王曄何本作瓮子為主改號曰建明元年爾朱氏自封王者八人長廣王都晉陽遣穎州爾朱兆舉兵向京師子恭軍失利兆自雷陂涉渡擒莊帝於式乾殿帝初以黃河奔急謂兆未得猝濟不意兆不由舟楫憑流而渡是日水淺不沒馬腹故及此難書契所記未之有也衒之曰昔光武受命冰橋凝於滹水昭烈中起的盧踊於泥溝皆理合於天神祇所福故能功濟宇宙大庇生民若兆者蜂目豺聲行窮梟獍阻兵安忍賊害君親皇靈有知鑒其凶德反使孟津由膝贊其逆心易稱天道禍盈鬼神福謙以此驗之信為虚說時兆營軍尚書省建天子金鼓庭設刻漏嬪御妃主皆擁之於幕鎖帝於寺門樓上時十二月帝患寒隨兆乞頭巾兆不與囚帝送晉陽縊於三級寺帝臨崩禮佛願不為國王又作五言曰權去生道促憂來死路長懷恨出國門含悲入鬼鄉隧門一時閉幽庭豈復光思鳥吟青松哀風吹白楊昔來聞死苦何言身自當至太昌元年冬始迎梓宮赴京師葬帝靖陵所作五言詩即為挽歌詞朝野聞之莫不悲慟百姓觀者悉皆掩涕而已魏書爾朱兆字萬仁榮從子又世隆字榮宗榮從弟又李苗字子宣梓潼人兼尚書右丞西北道行臺死後諡忠烈又長廣王曄字華興小字盆子南安王楨孫又朱瑞字元龍代郡桑乾人爾朱榮引為大行臺郎中官至侍中封樂陵郡公雖為爾朱所重乃心帝室為世隆所害又源子恭字靈順西平樂都人賀之曾孫也屢爭伐立功封臨汝縣子除中書監諡文獻又楊寛字蒙仁華陰人華州大中正除澄城縣伯爾朱兆入洛奔梁復還魏為大將軍永熙三年二月浮圖為火所燒帝登淩雲臺望火遣南陽王寶炬錄尚書長孫稚將羽林一千救赴火所莫不悲惜垂淚而去火初從弟八級中平旦火發當時雷雨晦冥雜下霰雪百姓道俗咸來觀看悲哀之聲震動京邑時有三比邱赴火而死火經三月不滅有入地柱火尋柱周年猶有煙氣其年五月中有人從象郡來云見浮圖於海中光明照耀儼然如新海上之民咸皆見之俄然霧起浮圖遂隱至七月中平陽王為侍中斛斯椿所使奔於長安十月而京師遷鄴魏書文帝寶炬永安二年封南陽王從孝武入關拜太宰錄尚書事孝武崩宇文泰率羣臣勸進在位十七年又長孫嵩曾孫冀歸高祖以其幼承家學賜名稚字承業靈太后時除尚書右僕射雍州刺史建中寺普泰元年尚書令樂平王爾朱世隆所立也本是閹官司空劉騰宅屋宇奢侈梁棟踰制一里之間廊廡充溢堂比宣光殿門匹乾明門博敞宏麗諸王莫及也在西陽門內御道北所謂延年里劉騰宅東有太僕寺寺東有乘黃署署東有武庫署即魏相國司馬文王府武庫東至閶闔宮門是也魏書劉騰平原人靈太后臨朝封長樂公與領軍元乂害清河王懌廢太后於宣光殿生段之柄決於二人之手內外屬請公然受納逼奪鄰居廣開室宇騰之治宅也周特筮之不吉止之騰不聽特告人曰必困於三月正光四年三月騰死聽事甫成陳屍其下西陽門內御道南有永康里里內復有領軍將軍元乂宅掘故井得石銘云是太尉荀彧宅正光年中元乂專權太后幽隔永巷騰為謀主乂是江夏王繼之子太后妹壻熙平初明帝幼沖諸王勸上太后拜乂為侍中領軍左右令總禁兵委以腹心反得幽隔永巷六年太后哭曰養虎自齧長虺成蛇至孝昌元年太后反政遂誅乂等沒騰田宅元乂誅日騰已物故太后追思騰罪發墓殘尸使其神靈無所歸聚以宅賜高陽王雍建明元年尚書令樂平王爾朱世隆為榮追福題以為寺朱門黃閣所謂仙居也以前廳為佛殿後堂為講室金華寶蓋徧滿其中有一涼風堂本騰避暑之處淒涼常冷經夏無蠅有萬年千歲之樹也魏書元乂小字夜叉道武裔孫也乂妻靈太后之妹為太后所信委聲勢日盛清河王懌裁之以法乂遂殺之遂幽胡太后乂與高陽王輔政肅宗呼為姨父後為高陽王解其兵柄乂解侍中為人告謀反賜死長秋寺劉騰所立也騰為長秋令卿因以為名在西陽陽門內御道北一里亦在延年里即是晉中朝時金市處水經注引故洛陽記曰淩雲臺西有金市金市北對洛陽壘寺北有濛氾池夏則有水冬則竭矣中有三層浮圖一所金盤靈剎耀諸城內作六牙白象負釋迦在虚空中莊嚴佛事悉用金玉作工之異難可具陳四月四日此像常出辟邪師子導引其前吞刀吐火騰驤一面綵幢上索詭譎不常奇伎異服冠於都市像停之處觀者如堵迭相踐躍常有死人瑤光寺世宗宣武皇帝所立在閶闔門御道北東去千秋門二里千秋門內道北有西遊園園中有淩雲臺即是魏文帝所築者臺上有八角井高祖於井北造涼風觀登之遠望目極洛川臺下有碧海曲池臺東有宣慈觀去地十丈觀東有靈芝釣臺累木為之出於海中去地二十丈風生戶牖雲起棟梁丹楹刻桷圖寫列仙刻石為鯨魚背負釣臺既如從地踊出又似空中飛下釣臺南有宣光殿北有嘉福殿西有九龍殿殿前九龍吐水成一海凡四殿皆有飛閣向靈芝臺往來三伏之月皇帝在靈芝臺以避暑三國志文帝紀黃初二年築淩雲臺太平御覽引晉宮閣名曰靈芝池廣長百五十步深二丈上有連樓飛觀四出閣道釣臺中有鳴鶴舟指南舟以此考之則靈芝之名不始元魏也有五層浮圖一所去地五十丈仙掌淩虛鐸垂雲表作工之妙美埒永甯講堂尼房五百餘閒綺疏連亘戶牖相通珍木香草不可勝言牛筋狗骨之木雞頭鴨脚之草亦悉備焉椒房嬪御學道之所掖庭美人竝在其中亦有名族處女性愛道塲落髮辭親來依此寺屏珍麗之飾服修道之衣投心八正歸誠一乘永安三年爾朱兆入洛陽縱兵大掠時有秀容胡騎數十人入寺淫穢自此後頗獲譏訕京師語曰洛陽男兒急作髻瑤光寺尼奪作壻瑤光寺北有承明門有金墉城即魏氏所築晉永康中惠帝幽於金墉城城東北角有魏文帝百尺樓年歲久遠形制如初高祖在城內作光極殿因名金墉城門為光極門又作重樓飛閣徧城上下從地望之有如雲也水經注皇居創徙宮極未就止蹕於此搆宵榭於故臺南曰乾光門夾建兩觀觀下列朱桁於塹以為御路東為含春門北有趯門城上東西列觀五十步一睥睨屋臺置一鐘以和漏鼓西北連廡函蔭墉比廣榭炎夏之日高祖常以避暑為淥水池一所在金墉者也東有洛陽小城永嘉中所築水經注穀水徑洛陽小城北因阿舊城憑結金墉故向城也永嘉之亂結以為壘號洛陽壘故洛陽記曰西有金市淩雲臺北對洛陽壘者也景樂寺太傅清河文獻王懌所立也懌是孝文皇帝之子宣武帝之弟魏書懌宇宣仁太和二十一年封為孝文及彭城王所器後為元乂劉騰所害閶闔南御道東西望永甯寺正相當寺西有司徒府東有大將軍高肇宅北連義井里義井里北門外有叢樹數十株枝條繁茂下有甘井一所石槽鐵罐供給行人飲水庇蔭多有憩者魏書外戚傳高肇北海人文昭皇后之兄也父颺自高麗入國肇封平原郡公尚世宗姑官大將軍順宗崩世言肇為之又殺北海王詳搆京兆王愉愉遂舉兵反又殺彭城王勰後為高陽王雍拉殺之有佛殿一所像輦在焉雕刻巧妙冠絕一時堂廡周環曲房連接輕條拂戶花蕊被庭至於六齋常設女樂歌聲繞梁舞袖徐轉絲管寥亮諧妙入神以是尼寺丈夫不得入得往觀者以為至天堂及文獻王薨寺禁稍寬百姓出入無復限礙後汝南王悅復修之悅是文獻之弟召諸音樂逞技寺內奇禽怪獸舞忭殿庭飛空幻惑世所未覩異端奇術總萃其中剝驢扳并植棗種瓜須臾之閒皆得賜食士女觀者目亂睛迷自建義以後京師頻有大兵此戲遂隱也昭儀尼寺閹宦所立也在東陽門內一里御道南東陽門內御道北太倉導官二署東南治粟里倉司官屬住其內太后臨朝閹寺專寵宦者之家積金滿堂是以蕭忻云高軒升斗者盡是閹宦之嫠婦胡馬鳴珂者莫非黃門之養息也忻陽平人也愛尚文籍少有名譽見閹寺寵盛遂發此言因即知名為治書侍御史有一佛二菩薩塑工精絕京師所無也四月七日常出詣景明景明三像恆出迎之伎樂之盛與劉騰相比堂前有酒樹麫木昭儀寺有池京師學徒謂之翟泉也衒之按杜預春秋注云翟泉在晉太倉西南按晉太倉在建春門內今太倉在東陽門內此地今在太倉西南明非翟泉也後隱士趙逸云此地是晉侍中石崇家池池南有綠珠樓於是學徒始寤經過者想見綠珠之容也池南有愿會寺中書舍人王翊捨宅立也佛堂前有桑樹一株直上五尺枝條橫繞柯葉㫄布形如羽蓋復高五尺又然凡為五重每重葉椹各異京師道俗謂之神桑觀者成市布施者甚眾帝聞而惡之以為惑眾命給事中黃門侍郎元紀伐之其日雲霧晦冥下斧之處血流至地見者莫不悲泣魏書王翊字士遊肅次兄深子也好學有文才結婚於元乂為濟州刺史入為金紫光祿大夫卒贈司空史不言為中書舍人寺南有宜壽里內有苞信縣令段暉宅地下常聞鐘聲時見五色光明照於堂宇暉甚異之遂掘光所得金像一軀可高三尺并有二菩薩趺上銘曰晉太始二年侍中中書監荀勗造暉遂捨宅為光明寺時人咸云此荀勗舊宅其後盜者欲竊此像像與菩薩合聲喝賊盜者驚怖應即殞倒眾僧聞像呌聲遂來捉得賊胡統寺太后從姑所立也入道為尼遂居此寺在永甯南一里寶塔五重金剎高聳洞房周匝對戶交疏朱柱素壁甚為佳麗其寺諸尼帝城名德善於開導工談義理常入宮與太后說法其資養緇流從無與比也修梵寺在青陽門內御道北嵩明寺復在修梵寺西並雕牆峻宇比屋連甍亦是名寺也修梵寺有金剛鳩鴿不入鳥鵲不棲菩提達摩云得其真相也寺北有永和里漢太師董卓之宅也里南北皆有池卓之所造今猶有水冬夏不竭里中太傅錄尚書長孫稚尚書右僕射郭祚吏部尚書邢巒廷尉卿元洪超衞尉卿許伯桃涼州刺史尉成興等六宅皆高門華屋齋館敞麗楸槐蔭途桐楊夾植當世名為貴里掘此地者輒得金玉寶玩之物邢巒家常掘丹砂及錢數十萬銘云董太師之物後卓夜中隨巒索此物巒不與之經年巒遂卒矣魏書郭祚字季祐太原人尚書右僕射領太子少師諡文貞又邢巒字洪濱河間人官殿中尚書諡文定又元洪超遼西公意烈之元孫也北軍將軍光祿大夫本傳不言為廷尉卿又尉聿字成興代人尉古真之族元孫官武衞將軍見元乂長揖不拜出為涼州刺史景林寺在開陽門內御道東講殿曡起房屋連屬丹檻炫日繡桷迎風實為勝地寺西有園多饒奇果春鳥秋蟬鳴聲相續有禪房一所內置泜洹清舍形製雖小巧構難比加以禪閣虛靜隱室凝邃嘉樹夾牖芳杜匝階雖云朝市想同巖谷靜行之僧繩坐其內餐風服道結跏數息有石銘一所國子博士盧白頭為其文白頭一字景裕范陽人也性愛恬靜邱園放傲學極六經說通百氏普泰初起家為國子博士雖在朱門以注述為事注周易行之於世也魏書盧景裕字仲儒小字白頭元族孫建春門內御道南有句盾典農籍田三署籍田南有司農寺御道北有空地擬作東宮晉中朝時太倉處也太倉南有翟泉周迴三里即春秋所謂王子虎晉狐偃盟於翟泉也水猶澄清洞底明淨鱗甲潛藏辨其魚鱉高祖於泉北置河南尹晉中朝時步廣里也泉西有華林園高祖以泉在園東因名蒼龍海華林園中有大海即漢天淵池池中猶有文帝九華臺高祖於臺上造清涼殿世宗在海內作蓬萊山山上有仙人館上有釣臺殿並作虹霓閣乘虚來往至於三月褉日季秋己辰皇帝駕龍舟鷁首遊於其山魏書世祖遊華林園觀故景陽山郭祚請修之帝曰魏明以奢失之於前朕豈可襲之於後乎海西有藏冰室六月出冰以給百官海西南有景山殿東有羲和嶺嶺上有温風室山西有姮娥峯峯上有寒露館並飛閣相通淩山跨谷山北有元武池山南有清暑殿殿東有臨澗亭殿西有臨危臺景陽觀山南有百果園果列作林林各有堂有仙人棗長五寸把之兩頭俱出核細如鍼霜降乃熟食之甚美俗傳云出昆侖山一曰西王母棗又有仙人桃其色赤表裏照徹得嚴霜乃熟亦出昆侖山一曰王母桃也果林南有石碑一所魏明帝所立也題曰苗茨之碑高祖於碑北作苗茨堂永安中年莊帝馬射於華林園百官皆來讀碑疑苗字誤國子博士李同軌曰魏明英才世稱三祖公幹仲宣為其羽翼但未知本意如何不得言誤也衒之時為奉朝請因即釋曰以蒿覆之故言苗茨何誤之有眾咸稱善以為得其旨歸按水經注作茅茨堂與此不同或是道元所改耶按趙一清注水經注云公幹仲宣羽翼明帝亦未是劉王皆丕客至叡時二人之骨朽久矣果林西有都堂有流觴池堂東有扶桑海凡此諸海皆有石竇流於地下西通穀水東連陽渠亦與翟泉相連若旱魃為虐穀水注之不竭離畢㫄潤陽渠泄之不盈至於鱗甲異品羽毛殊類濯波浮浪如似自然也
