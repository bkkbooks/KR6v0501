body:
  text: 城北禪虛寺在大夏門御道西寺前有閲武場歲終農隙甲士習戰千乘萬騎常在於此羽林馬僧相善抵角戲擲戟與百尺樹齊等虎賁張車渠擲刀出樓一丈帝亦觀戲在樓恆令二人對為角戲中朝時宣武場在大夏門東北今為光風園苜蓿出焉按出字何作在吳作生今從御覽凝玄寺閹官濟州刺史賈粲所立也在廣莫門外一里御道東所謂永平里也注即漢太上王廣處遷京之初創居此里直母亡捨以為寺地形高顯下臨城闕房廡精麗竹柏成林實是淨行息心之所也王公卿士來遊觀為五言者不可勝數魏書賈粲酒泉人為光祿大夫靈太后之廢粲與元乂為黨太后反政出為濟州刺史遣刁宣馳驛殺之按太上王廣疑當作漢太上皇廟又水經注陽渠水又東徑漢廣野君酈食其廟南廟在北山上此記所言或指此廟未可知也洛陽城東北有上高里殷之頑民所居處也高祖名聞義里遷京之始朝士住其中迭相譏刺竟皆去之惟有造瓦者止其內京師瓦器出焉世人歌曰洛城東北上高里殷之頑民昔所止今日百姓造甕子人皆棄去住者恥唯冠軍將軍郭文遠遊憩其中堂宇園林匹於邦君時隴西李元謙樂雙聲語嘗經文遠宅前過見其門閥華美乃曰是誰第宅過佳婢春風出曰郭冠軍家元謙曰凡婢雙聲春風曰儜奴慢罵元謙服婢之能於是京邑翕然傳之聞義里有敦煌人宋雲宅雲與惠生俱使西域也神龜元年十一月冬太后遣崇立寺比邱惠生向西域取經凡得一百七十部皆是大乘妙典初發京師西行四十日至赤嶺即國之西疆也皇魏關防正在於此赤領者不生草木因以為名其山有鳥鼠同穴異種共類鳥雄鼠雌共為陰陽即所謂鳥鼠同穴發赤領西行二十三日渡流沙至吐谷渾國路中甚寒多饒風雪飛沙走礫舉目皆滿唯吐谷渾城左右暖於餘處其國有文字況同魏風俗政治多為夷法從吐谷渾西行三千五百里至鄯善城其城自立王為吐谷渾所吞今城內主是吐谷渾第二息寧西將軍總部落三千以禦西胡從鄯善西行一千六百四十里至左末城城中居民可有百家土地無雨決水種麥不知用牛耒耜而田城中圖佛與菩薩乃無胡貌訪故老云是呂光伐胡所作從左末城西行一千二百七十五里至末城城旁花果似洛陽唯土屋平頭為異也從末城西行二十二里至捍慶城南十五里有一大寺三百餘衆僧有金像一軀舉高丈六儀容超絶相好炳然面恆東立不肻西顧父老傳云此像本從南方騰空而來于闐國王親見禮拜載像歸中路夜宿忽然不見遣人尋之還來本處即起塔封四百戶供灑掃人戶有患以金箔帖像所患處即得除愈後人於像邊造丈六像者及諸塔乃至數千懸綵幡蓋亦有萬計魏國之幡過半矣幅上隸書多云大和十九年景明二年延昌二年唯有一幅觀其年號是姚興時幡從捍慶城西行八百七十八里至于闐國王頭著金冠似雞幘頭後垂二尺生絹廣五寸以為飾威儀有鼓角金鉦弓箭一具戟二枝槊五張左右帶刀不過百人其俗婦人袴衫束帶乘馬馳走與丈夫無異死者以火焚燒收骨葬之上起浮圖居喪者剪髮剺面以為哀戚髮長四寸即就平常唯王死不燒置之棺中遠葬於野立廟祭祀以時思之于闐王不信佛法有商胡將一比邱名毗盧旃在城南杏樹下向王伏罪云今輒將異國沙門來在城南杏樹下王聞忽怒即往看毗盧旃旃語王曰如來遣我來令王造覆甕浮圖一區使王祚永隆王言令我見佛當即從命毗盧旃鳴鐘聲告佛即遣羅侯羅變形為佛從空而見真容王五體投地即於杏樹下置立寺舍畫作羅侯羅像忽然自滅于闐王更作精舍籠之令覆甕之影恆出屋外見之者無不回向其中有辟支佛鞾於今不爛非皮非綵莫能審之案于闐國境東西不過三千餘里神龜二年七月二十九日入朱駒波國人民山居五穀甚豐食則麥麩不立屠殺食肉者以自死肉風俗言音與于闐相似文字與波羅門同其國疆界可五日行遍八月初入漢盤陀國界西行六日登蔥領山復西行三日至鉢盂城三日至不可依山其處甚寒冬夏積雪山中有池毒龍居之昔有商人止宿池側值龍忿怒咒殺商人盤陀王聞之舍位與子向烏萇國學婆羅門咒四年之中盡得其術還復王位就池咒龍龍變為人悔過向王王即徙之蔥領山去此池二千餘里今日國王十三世祖自此以西山路欹側危坂千里懸崖萬仞極天之阻實在於斯太行孟門匹茲匪險崤關隴坂方此則夷自發蔥領步步漸高如此四日乃得至領依約中下實半天矣漢盤陀國正在山頂自蔥領以西水皆西流入西海世人云是天地之中人民決水而種聞中國田待雨而種笑曰天何由可與期也城東有孟津河東北流向沙勒蔥領高峻不生草木是時八月天氣已寒北風驅雁飛雪千里九月中旬入鉢和國高山深谷嶮道如常國王所住因山為城人民服飾惟有氈衣地土甚寒窟穴而居風雪徑切人畜相依國之南界有大雪山朝融夕結望若玉峰十月初旬入厭達國土田庶衍山澤彌望居無城郭遊軍而治以氈為屋隨逐水草夏則隨涼冬則就溫鄉土不識文字禮教俱闕陰陽運轉莫知其度年無盈閏月無大小用十二月為一歲受諸國貢獻南至牒羅北盡敕勒東被于闐西及波斯四十餘國咸來朝貢王居大氈帳方四十步周回以氍毹為壁王著錦衣坐金牀以金鳳皇為牀腳見大魏使人再拜跪受詔書至於設會一人唱則客前後唱則罷會唯有此法不見音樂嚈噠國王妃亦著錦衣長八尺垂地三尺使人擎之頭戴一角長八尺奇長三尺以玫瑰五色裝飾其上王妃出則輿之入坐金牀以六牙白象四獅子為牀腳自餘大臣妻皆隨傘頭亦似有角團圓下垂狀似寶蓋觀其貴賤亦有服章四夷之中最為強大不信佛法多事外神殺生血食器用七寶諸夷奉獻甚饒珍異按嚈噠國去京二萬餘里十一月初入波斯國境土甚狹七日行過人民山居資業窮煎風俗凶慢見王無禮國王出入從者數人其國有水昔日甚淺後山崩絶流變為二池毒龍居之多有災異夏喜暴雨冬則積雪行人由之多致艱難雪有白光照耀人眼令人閉目茫然無見祭祀龍王然後平復十一月中旬入賒彌國漸出蔥領土田嶢埆民多貧困峻路危道人馬僅通一直一道從鉢盧國向烏場國鐵鎖為橋懸虛為渡下不見底旁無挽捉倏忽之間投軀萬仞是以行者望風謝路耳十二月初入烏傷國北接蔥領南連天竺土氣和暖地方數千里民物殷阜匹臨淄之神州原田膴膴等咸陽之上土鞞羅施兒之所薩埵投身之地舊俗雖遠土風猶存國王精進菜食長齋晨夜禮佛擊鼓吹貝琵琶箜篌笙簫備有日中以後始治國事假有死罪不立刑殺唯徙空山任其飲啄事涉疑似以藥服之清濁則驗隨事輕重當時即決土田肥美人物豐饒百穀盡登五果繁熟夜則聞鐘遍滿世界土饒異花冬夏相接道俗採之上佛供養國王見大魏使宋雲來拜受詔書聞太后崇奉佛法即面東合掌遙心頂禮遣解魏語人問宋雲曰卿是日出人也宋雲答曰我國東界有大海水日出其中實如來旨王又問曰彼國出聖人否宋雲具説周孔莊老之德次序蓬萊山上銀堂金闕神仙聖人並在其上説管輅善卜華陀治病左慈方術如此之事分別説之王曰若如卿言即是佛國我當命終願生彼國宋雲於是與惠生出城外尋如來教迹水東有佛曬衣處初如來在烏傷國行化龍王瞋怒興大風雨佛僧伽梨表裏通溼雨止佛在石下東面而坐曬袈裟年歲雖久彪炳若新非直條縫明見至於細縷亦彰乍往觀之如似未徹假令刮削其文轉明佛坐處及曬衣所並有塔記水西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寶投之池中在後涌出令僧取之此寺衣食待龍而濟世人名為龍王寺王城北十八里有如來履石之迹起塔籠之履石之處若似踐泥量之不定或長或短今立寺可七十餘僧塔南二十步有泉石佛本清淨嚼楊枝植地即生今成大樹胡名曰婆樓城北有陀羅寺佛事最多浮圖高大僧房逼側周匝金像六千軀王年常大會於此寺國內沙門咸來雲集宋雲惠生見彼比邱戒行精苦觀其風範特加恭敬遂捨奴婢二人以供灑掃去王城東南山行八日如來苦行投身餓虎之處高山巃嵸危岫入雲嘉木靈芝叢生其上林泉婉麗花綵矅目宋雲惠生割捨行資於山頂造浮圖一區刻石隸書銘魏功德山有收骨寺三百餘僧王城南一百餘里有如來昔作摩休國剝皮為紙折骨為筆處阿育王起塔籠之舉高十丈折骨之處髓流著石觀其脂色肥膩若新王城西南五百里有善持山甘泉美果見於經記山谷和暖草木冬青當時太簇御辰溫風已扇鳥鳴春樹蝶飛花叢宋雲遠在絶域因矚此芳景懷歸之思獨軫中腸遂動舊疹纒綿經月得婆羅門咒然後平善山頂東南有太子石室一兩房太子室前十步有大方石云太子常坐其上阿育王起塔記之塔南一里太子草庵處去塔一里東北下山五十步有太子男女繞樹不去婆羅門以杖鞭之流血灑地處其樹猶存灑血之地今為泉水室西三里天帝釋化為獅子當路蹲坐遮嫚𡛠之處石上毛尾爪迹今悉炳然阿周陀窟及門子供養王父母處皆有塔記山中有昔五百羅漢牀南北兩行相向坐處其次弟相對有大寺僧徒二百人太子所食泉水北有寺恆以驢數頭運糧上山無人驅逐自然往還寅發午至每及中餐此是護塔神渥婆仙使之然此寺昔日有沙彌常除灰因入神定維那挽之不覺皮連骨離渥婆仙代沙彌除灰處國王與渥婆仙立廟圖其形象以金箔貼之隔小嶺有婆姦寺夜叉所造僧徒八十人云羅漢夜叉常來供養灑掃取薪凡俗比邱不得在寺大魏沙門道榮至此禮拜而去不敢留停至正光元年四月中旬入乾陀羅國土地亦與烏場國相似本名業波羅國為厭達所滅遂立敕勤為王治國以來已經二世立性凶暴多行殺戮不信佛法好事鬼神國中人民悉是婆羅門種崇奉佛教好讀經典忽得此王深非情願自恃勇力與罽賓爭境連兵戰鬬已厯三年王有鬬象七百頭一負十人手持刀揸象鼻縛刀與敵相擊王常停境上終日不歸師老民勞百姓嗟怨宋雲詣軍通詔書王凶慢無禮坐受詔書宋雲見其遠夷不可制任其倨傲莫能責之王遣傳事謂宋雲曰卿涉諸國經過險路得無勞苦也宋雲答曰我皇帝深味大乘遠求經典道路雖險未敢言疲大王親統三軍遠臨邊境寒暑驟移不無頓弊王答曰不能降伏小國愧卿此問宋雲初謂王是夷人不可以禮責任其坐受詔書及親往復乃有人情遂責之曰山有高下水有大小人處世間亦有尊卑厭達烏場王並拜受詔書大王何獨不拜王答曰我見魏主則拜得書坐讀有何可怪世人得父母書猶自坐讀大魏如我父母我亦坐讀書於理無失雲無以屈之遂將雲至一寺供給甚薄時跋提國送獅子兒兩頭與乾陀王雲等見之觀其意氣雄猛中國所畫莫參其儀於是西行五日至如來捨頭施人處亦有塔寺二十餘僧復西行三月至辛頭大河河西岸上有如來作摩竭大魚從河而出十二年以肉濟人處起塔為記石上猶有魚鱗紋復西行十三日至佛沙伏城川原沃壤城郭端直民戶殷多林泉茂盛土饒珍寶風俗淳善其城內外凡有古寺名僧德衆道行高奇城北一里有白象宮寺內佛事皆是石象莊嚴極麗頭數甚多通身金箔眩耀人目寺前繫白象樹此寺之興實由茲焉花葉似棗季冬始熟父老傳云此寺滅佛法亦滅寺內圖太子夫妻以兒女乞婆羅門像胡人見之莫不悲泣復西行一日至如來挑眼施人處亦有塔寺寺石上有伽葉佛迹復西行一日乘船渡一深水三百餘步復西南行六十里至乾陀羅城東南七里有雀離浮圖道榮傳云城東四里推其本源乃是如來在世之時與弟子遊化此土指城東曰我入涅槃後三百年有國王名迦尼色迦此處起浮圖佛入涅槃後二百年來果有國王名迦尼色迦出遊城東見四童子纍牛糞為塔高可三尺俄然即失道榮傳云童子在虛空中向王説偈王怪此童子即作塔籠之糞塔漸高挺出於外去地四百尺然後止王始更廣塔基三百餘步道榮傳云三百九十步從此構木始得齊等道榮傳云其高三丈悉用文石為陛階砌櫨栱上構衆木凡十三級上有鐵棖高三丈金盤十三重合去地七百尺道榮傳云鐵柱八十八尺八十圍金盤十五重去地六十三丈二尺施功既訖糞塔如初在大塔南三步婆羅門不信是糞以手探看遂作一孔年歲雖久糞猶不爛以香泥填孔不可充滿今天宮籠蓋之雀離浮圖自作以來三經天火所燒國王修之還復如故父老云此浮圖天火七燒佛法當滅道榮傳云王修浮圖木工既訖猶有鐵柱無有能上者王於四角起大高樓多置金銀及諸寶物王與夫人及諸王子悉在樓上燒香散花至心精然後轆轤絞索一舉便到故胡人皆云四天王助之若其不爾實非人力所能舉塔內佛事悉是金玉千變萬化難得而稱旭日始升則金盤晃朗微風漸發則寶鐸和鳴西域浮圖最為第一此塔初成用珍珠為羅網覆於其上於後數年王乃思量此珠網價值萬金我崩之後恐人侵奪復慮大塔破壞無人修補即解珠網以銅鑊盛之在塔西北一百步掘地埋之上種樹樹名菩提枝條四布密葉蔽天樹下四面坐像各高丈五恆有四龍典掌此珠若興心欲取則有禍變刻石為銘屬語將來若此塔壞勞煩後賢出珠修治雀離浮圖南五十步有一石塔其形正圓高二丈甚有神變能與世人報吉凶觸之若吉者金鈴鳴應若凶者假令人搖撼亦不肯鳴惠生既在遠國恐不吉反遂禮塔神乞求一驗於是以指觸之鈴即鳴應得此驗用慰私心後果得吉反惠生初發京師之日皇太后敕付五色百尺幡千口錦香囊五百枚王公卿士幡二千口惠生從于闐至乾陀所有佛事悉皆流布至此頓盡唯留太后百尺幡一口擬上尸毗王塔宋雪以奴婢二人奉雀離浮圖永充灑掃惠生遂減割行資妙簡良匠以鍮摹寫雀離浮圖儀一軀及釋迦四塔變於是西北行七日渡一大水至如來為尸毗王救鴿之處亦起塔寺昔尸毗王倉庫為火所燒其中粳米焦然至今猶在若服一粒永無瘧患彼國人民須藥日取之道榮傳云那迦羅訶國有佛頂骨方圓四寸黃白色下有孔受人手指閃然似仰蜂窠至耆賀濫寺有佛袈裟十三條以尺量之或短或長復有佛錫杖長丈七以木桶盛之金箔其上此杖輕重不定值有重時百人不舉值有輕時一人勝之那竭城中有佛牙佛髮並作寶函盛之朝夕供養至瞿羅羅鹿見佛影窟入山十五步回面向戶遙望則衆相炳然近看暝然不見以手摩之唯有石壁漸漸却行始見其相容顏挺特世所希有窟前方石石上有佛迹窟西南百步有佛浣衣處窟北一里有目連窟窟北有山山下有六佛手作浮圖高十丈云此浮圖陷入地佛法當滅并為七塔塔南石銘云如來手書胡字分明於今可識焉惠生在烏傷國二年西胡風俗大同小異不能具録至正光二年二月始還天闕衒之按惠生行記事多不盡録今依道榮傳宋雲家記故並載之以備缺文京師東西二十里南北十五里戶十萬九千餘廟社宮室府曹以外方三百步為一里里開四門門置里正二人吏四人門士八人合有二百二十里寺有一千三百六十七所天平元年遷都鄴城洛陽餘寺四百二十一所北芒山上有馮王寺齊獻武王寺京東石關有元領軍寺劉長秋寺嵩高中有間居寺栖禪寺嵩陽寺道場寺上有中頂寺東有升道寺京南闕口有石窟寺靈巖寺京西瀍澗有白馬寺照樂寺如此之寺既郭外不在數限亦詳載之
